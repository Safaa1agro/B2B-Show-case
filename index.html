<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Agro & Food Product Catalog</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Header -->
    <header class="bg-white shadow-xs sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tight text-emerald-800">B2B AGRO EXPORTS</div>
            <nav class="space-x-6 text-sm font-medium text-gray-600">
                <a href="#" class="hover:text-emerald-800">Products</a>
                <a href="#" class="hover:text-emerald-800">About Us</a>
            </nav>
        </div>
    </header>

    <!-- B2B Banner -->
    <section class="bg-emerald-900 text-white py-6 text-center px-4">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-sm uppercase tracking-widest font-semibold text-emerald-200 mb-2">💼 International Bulk Agro Inquiries 💼</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm mt-4 font-light">
                <div class="p-2 bg-emerald-800/50 rounded-lg">1. Browse Catalog</div>
                <div class="p-2 bg-emerald-800/50 rounded-lg">2. Request Product Quote</div>
                <div class="p-2 bg-emerald-800/50 rounded-lg">3. Receive Custom Invoice</div>
            </div>
        </div>
    </section>

    <!-- Product Grid Section -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-10">Our Permanent Product Range</h1>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <!-- THE AUTOMATION LOGIC -->
    <script>
        // 1. GLOBAL CONFIGURATION
        const WHATSAPP_NUMBER = "923001234567"; // Put your country code + phone number (No spaces, no + sign)
        const BUSINESS_EMAIL = "your-email@example.com"; // Your company email address

        // 2. YOUR EXPANDED PRODUCT LIST
        const products = [
            {
                id: "AG-01",
                name: "Premium Fresh Garlic",
                category: "Alliums / Fresh Vegetables",
                usage: "Widely used for direct culinary consumption, garlic powder manufacturing, and oil extraction in pharmaceutical industries.",
                benefits: "Rich in Allicin, possesses strong natural antibacterial properties, supports cardiovascular health, and boosts immunity.",
                // Add multiple images here. The first one will be the main photo.
                images: [
                    "https://images.unsplash.com/photo-1540148426945-6cf22a6b2383?auto=format&fit=crop&w=600&q=80", // Angle 1
                    "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?auto=format&fit=crop&w=600&q=80"  // Angle 2
                ]
            },
            {
                id: "AG-02",
                name: "Organic Turmeric Finger",
                category: "Spices / Roots",
                usage: "Essential culinary spice, highly sought after in the cosmetics industry for skincare products and textile dyeing.",
                benefits: "Contains high Curcumin levels, powerful anti-inflammatory and antioxidant agents, promotes joint and skin health.",
                images: [
                    "https://images.unsplash.com/photo-1615485500995-2761b5ac327a?auto=format&fit=crop&w=600&q=80",
                    "https://images.unsplash.com/photo-1583209814683-c023de294402?auto=format&fit=crop&w=600&q=80"
                ]
            }
            // <-- Add products 3 to 100 right down here
        ];

        // 3. GENERATE THE CATALOG AUTOMATICALLY
        const gridContainer = document.getElementById('product-grid');
        
        products.forEach((product, index) => {
            const whatsappText = encodeURIComponent(`Hi, I am viewing your B2B showcase. I am interested in an agro inquiry for "${product.name}" (Model: ${product.id}). Please share bulk pricing.`);
            const emailSubject = encodeURIComponent(`B2B Agro Inquiry for Model: ${product.id}`);
            const emailBody = encodeURIComponent(`Hi,\n\nI am interested in your product: ${product.name} (Model: ${product.id}).\n\nPlease share wholesale structures and MOQ details.\n\nRegards.`);

            // Generate HTML for thumbnails if there are multiple images
            let thumbnailsHTML = '';
            if (product.images.length > 1) {
                thumbnailsHTML = `<div class="flex gap-2 px-6 pb-2 overflow-x-auto">`;
                product.images.forEach((imgUrl) => {
                    thumbnailsHTML += `
                        <button onclick="document.getElementById('main-img-${index}').src='${imgUrl}'" class="w-12 h-12 rounded border border-gray-200 overflow-hidden focus:outline-hidden focus:border-emerald-600 transition-colors shrink-0">
                            <img src="${imgUrl}" class="w-full h-full object-cover">
                        </button>
                    `;
                });
                thumbnailsHTML += `</div>`;
            }

            // Build out the structured layout template
            const cardHTML = `
                <div class="bg-white rounded-xl shadow-xs border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                    <!-- Main Gallery Photo -->
                    <img id="main-img-${index}" src="${product.images[0]}" alt="${product.name}" class="h-56 w-full object-cover bg-gray-100 transition-all duration-200">
                    
                    <!-- Thumbnails Row -->
                    ${thumbnailsHTML}
                    
                    <!-- Content Card Details -->
                    <div class="p-6 flex-1 flex flex-col justify-between bg-white">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-semibold text-emerald-600 uppercase tracking-wider">Model: ${product.id}</span>
                                <span class="text-[11px] bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full font-medium">${product.category}</span>
                            </div>
                            <h3 class="text-xl font-bold text-gray-900 mb-4">${product.name}</h3>
                            
                            <!-- B2B Details Specifications -->
                            <div class="space-y-3 text-xs mb-6">
                                <div class="bg-gray-50 p-2.5 rounded-lg border-l-2 border-blue-500">
                                    <strong class="text-gray-700 block mb-0.5">⚙️ Industrial & Culinary Usage:</strong>
                                    <p class="text-gray-600 leading-relaxed">${product.usage}</p>
                                </div>
                                <div class="bg-gray-50 p-2.5 rounded-lg border-l-2 border-emerald-500">
                                    <strong class="text-gray-700 block mb-0.5">❤️ Health & Medical Benefits:</strong>
                                    <p class="text-gray-600 leading-relaxed">${product.benefits}</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Actions Buttons -->
                        <div class="space-y-2 mt-auto">
                            <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${whatsappText}" target="_blank" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-center py-2.5 rounded-lg font-medium text-sm block transition-colors">
                                🟢 Inquire via WhatsApp
                            </a>
                            <a href="mailto:${BUSINESS_EMAIL}?subject=${emailSubject}&body=${emailBody}" class="w-full bg-gray-800 hover:bg-gray-900 text-white text-center py-2.5 rounded-lg font-medium text-sm block transition-colors">
                                ✉️ Email an Inquiry
                            </a>
                        </div>
                    </div>
                </div>
            `;
            gridContainer.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
